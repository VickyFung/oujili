# /etc/nginx/conf.d/gugu.conf - 先使用 HTTP 配置
server {
    server_name oujiliadmin.crget.com;
    root /var/www/oujiliadmin;
    index index.html index.htm;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    location /api {
		   proxy_pass http://127.0.0.1:8088/;
		   proxy_set_header Host $Host:$server_port; 
		   proxy_set_header X-Real-IP $remote_addr; 
		   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
		   proxy_set_header REMOTE-HOST $remote_addr; 
		   add_header X-Cache $upstream_cache_status; 
		   proxy_connect_timeout 30s; 
		   proxy_read_timeout 86400s; 
		   proxy_send_timeout 30s; 
		   proxy_http_version 1.1; 
		   proxy_set_header Upgrade $http_upgrade; 
		   proxy_set_header Connection "upgrade"; 
	  }
     location /file {
                     add_header 'Access-Control-Allow-Origin' '*';
                                proxy_pass http://127.0.0.1:8088/file;
                                proxy_redirect off;
                                proxy_set_header  Host $host;
                                proxy_set_header   X-real-ip $remote_addr;
                                proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
                }


    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/oujiliadmin.crget.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/oujiliadmin.crget.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    if ($host = oujiliadmin.crget.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name oujiliadmin.crget.com;
    listen 80;
    return 404; # managed by Certbot


}